version: '3.8'
services:

  # 🚀 KONTAINER 1: APLIKASI LARAVEL (PHP Engine)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dandy-laravel-app
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - siber-network

  # 🌐 KONTAINER 2: WEB SERVER NGINX (Penerima Trafik Luar)
  webserver:
    image: nginx:alpine
    container_name: dandy-nginx-server
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80" # Port fisik laptopmu (8080) di-NAT/Forwarding ke port 80 di dalam Docker
    volumes:
      - .:/var/www
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    networks:
      - siber-network
    depends_on:
      - app

  # 💾 KONTAINER 3: DATABASE MYSQL
  db:
    image: mysql:8.0
    container_name: dandy-mysql-db
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306" # Port 3307 laptopmu diteruskan ke 3306 kontainer (agar tidak bentrok jika XAMPP lokalmu menyala)
    environment:
      MYSQL_DATABASE: web_profil_docker
      MYSQL_ROOT_PASSWORD: password_root_siber
      MYSQL_USER: dandy_siber
      MYSQL_PASSWORD: password_dandy_siber
    volumes:
      - dandy-dbdata:/var/lib/mysql
    networks:
      - siber-network


      # 🛠️ [BARU] KONTAINER 4: PHPMYADMIN (Alat Kelola Database Visual)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dandy-phpmyadmin
    restart: unless-stopped
    ports:
      - "8085:80" # Kamu bisa akses alat ini nanti di http://localhost:8085
    environment:
      PMA_HOST: db # Memperintahkan phpmyadmin untuk menembak Kotak 'db' di jaringan virtual
      PMA_PORT: 3306
    networks:
      - siber-network
    depends_on:
      - db # Kotak ini baru akan menyala setelah Kotak database ('db') sukses hidup duluan

# 🗺️ DESAIN TOPOLOGI JARINGAN VIRTUAL (VLAN / Virtual Switch)
networks:
  siber-network:
    driver: bridge

# 💾 PENYIMPANAN DATA PERSISTEN DATABASE (Harddisk Virtual)
volumes:
  dandy-dbdata:
    driver: local
